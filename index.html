<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Road Trip Planner｜行程管家</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand__title">Road Trip Planner</div>
      <div class="brand__sub">繁中主 · EN assist · Offline-first · OSM map · JSON import/export</div>
    </div>
    <div class="topbar__right">
      <button class="btn btn--ghost" id="btnShare">分享</button>
      <button class="btn btn--ghost" id="btnExport">匯出</button>
      <button class="btn btn--ghost" id="btnImport">匯入</button>
      <input id="importFile" type="file" accept="application/json,.json" hidden>
    </div>
  </header>

  <main class="main">
    <section id="warningBar"></section>
    <section id="view-today" class="view"></section>
    <section id="view-itinerary" class="view hidden"></section>
    <section id="view-map" class="view hidden"></section>
    <section id="view-bookings" class="view hidden"></section>
    <section id="view-checklist" class="view hidden"></section>
    <section id="view-settings" class="view hidden"></section>
  </main>

  <nav class="bottomnav">
    <button class="bottomnav__item active" data-tab="today"><span>☀️</span><span>今日</span></button>
    <button class="bottomnav__item" data-tab="itinerary"><span>🗓️</span><span>行程</span></button>
    <button class="bottomnav__item" data-tab="map"><span>🗺️</span><span>地圖</span></button>
    <button class="bottomnav__item" data-tab="bookings"><span>🎟️</span><span>預訂</span></button>
    <button class="bottomnav__item" data-tab="checklist"><span>✅</span><span>清單</span></button>
    <button class="bottomnav__item" data-tab="settings"><span>⚙️</span><span>設定</span></button>
  </nav>

  <dialog id="stopDialog" class="dialog">
    <form method="dialog" class="dialog__card">
      <div class="dialog__head">
        <div>
          <div class="dialog__title" id="stopDialogTitle">新增 Stop</div>
          <div class="dialog__hint">可拖拉排序；可 geocode；可自動排時間</div>
        </div>
        <button class="iconbtn" value="cancel" aria-label="Close">✕</button>
      </div>
      <div class="dialog__body">
        <div class="formgrid">
          <label class="field"><span class="field__label">日期 Day</span><select id="f_day"></select></label>
          <label class="field"><span class="field__label">時間 Start</span><input id="f_time" type="time"></label>
          <label class="field"><span class="field__label">中文名稱 ZH</span><input id="f_nameZh" placeholder="例如：Bondi Beach"></label>
          <label class="field"><span class="field__label">英文 EN（可選）</span><input id="f_nameEn" placeholder="Bondi Beach"></label>
          <label class="field field--full"><span class="field__label">地圖查詢 / 地址 Map query</span><input id="f_query" placeholder="名稱或地址，例如：Puffing Billy Railway Belgrave Station"></label>
          <label class="field"><span class="field__label">Latitude（可選）</span><input id="f_lat" type="number" step="0.000001"></label>
          <label class="field"><span class="field__label">Longitude（可選）</span><input id="f_lng" type="number" step="0.000001"></label>
          <label class="field"><span class="field__label">停留分鐘 Duration</span><input id="f_duration" type="number" min="0" step="5"></label>
          <label class="field"><span class="field__label">標籤 Tags</span>
            <select id="f_tags" multiple>
              <option value="Scenic">Scenic 景觀</option>
              <option value="Wildlife">Wildlife 動物</option>
              <option value="Food">Food 餐飲</option>
              <option value="Fuel">Fuel 加油</option>
              <option value="Stay">Stay 住宿</option>
              <option value="Ticket">Ticket 門票</option>
              <option value="Safety">Safety 安全</option>
            </select>
          </label>
          <label class="field field--full"><span class="field__label">備註 Notes</span><textarea id="f_notes" placeholder="停車、步行強度、爸媽步速、天氣備註…"></textarea></label>
         <label class="field">
  <span class="field__label">需預訂?</span>
  <select id="f_ticket">
    <option value="no">No</option>
    <option value="yes">Yes</option>
  </select>
</label>

<label class="field">
  <span class="field__label">鎖定時間 Lock time</span>
  <input id="f_locked" type="checkbox">
</label>

<label class="field">
  <span class="field__label">關聯預訂（可選）</span>
  <select id="f_booking"></select>
</label>
          <input type="hidden" id="f_stopId">
        </div>
      </div>
      <div class="dialog__foot">
        <button class="btn btn--danger" id="btnDeleteStop" type="button">刪除</button>
        <div class="spacer"></div>
        <button class="btn" value="cancel">取消</button>
        <button class="btn" id="btnGeocodeStop" type="button">Geocode</button>
        <button class="btn btn--primary" id="btnSaveStop" type="button">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="bookingDialog" class="dialog">
    <form method="dialog" class="dialog__card">
      <div class="dialog__head">
        <div>
          <div class="dialog__title" id="bookingDialogTitle">新增 Booking</div>
          <div class="dialog__hint">把 confirmation、時間、金額集中一處（離線可讀）</div>
        </div>
        <button class="iconbtn" value="cancel" aria-label="Close">✕</button>
      </div>
      <div class="dialog__body">
        <div class="formgrid">
          <label class="field"><span class="field__label">類型 Type</span><select id="b_type"><option value="activity">Activity</option><option value="hotel">Hotel</option><option value="car">Car rental</option><option value="flight">Flight</option><option value="other">Other</option></select></label>
          <label class="field"><span class="field__label">供應商 Provider</span><input id="b_provider"></label>
          <label class="field"><span class="field__label">日期時間 Datetime</span><input id="b_datetime" placeholder="2026-04-09 19:30"></label>
          <label class="field"><span class="field__label">Confirmation No.</span><input id="b_conf"></label>
          <label class="field"><span class="field__label">價格 Price</span><input id="b_price"></label>
          <label class="field"><span class="field__label">幣別 Currency</span><input id="b_currency" value="AUD"></label>
          <label class="field field--full"><span class="field__label">備註 Notes</span><textarea id="b_notes"></textarea></label>
          <input type="hidden" id="b_id">
        </div>
      </div>
      <div class="dialog__foot">
        <button class="btn btn--danger" id="btnDeleteBooking" type="button">刪除</button>
        <div class="spacer"></div>
        <button class="btn" value="cancel">取消</button>
        <button class="btn btn--primary" id="btnSaveBooking" type="button">保存</button>
      </div>
    </form>
  </dialog>

  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
